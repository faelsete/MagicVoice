<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MagicVoice - Text to Speech</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" />
                    <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
                    <line x1="12" y1="19" x2="12" y2="23" />
                    <line x1="8" y1="23" x2="16" y2="23" />
                </svg>
                MagicVoice
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container">
        <!-- Mode Selector -->
        <div class="mode-selector">
            <button class="mode-btn active" data-mode="conversion" onclick="setMode('conversion')">
                Conversão Rápida
            </button>
            <button class="mode-btn" data-mode="audiobook" onclick="setMode('audiobook')">
                Audiolivro
            </button>
        </div>

        <!-- Input Card -->
        <div class="card" id="inputCard">
            <div class="card-title" id="modeDescription">Cole seu texto (máx. 9 minutos de áudio)</div>

            <textarea class="text-input" id="textInput" placeholder="Cole ou digite seu texto aqui..."></textarea>

            <div class="char-counter" id="charCounter">
                <span id="charCount">0</span> / <span id="charLimit">8000</span> caracteres
            </div>

            <!-- Voice Selection -->
            <div class="voice-selector">
                <div class="select-wrapper">
                    <label class="select-label">Idioma</label>
                    <select class="select" id="languageSelect" onchange="updateVoices()">
                        <option value="pt-BR">Português (Brasil)</option>
                        <option value="en-US">English (US)</option>
                        <option value="es-MX">Español (México)</option>
                        <option value="multilingual">Multilíngue</option>
                    </select>
                </div>
                <div class="select-wrapper">
                    <label class="select-label">Voz</label>
                    <select class="select" id="voiceSelect">
                        <option value="pt-BR-AntonioNeural">Antônio</option>
                        <option value="pt-BR-FranciscaNeural">Francisca</option>
                        <option value="pt-BR-ThalitaNeural">Thalita</option>
                    </select>
                </div>
            </div>

            <!-- Generate Button -->
            <button class="btn-primary" id="generateBtn" onclick="generateAudio()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="5 3 19 12 5 21 5 3" />
                </svg>
                Gerar Áudio
            </button>

            <!-- Progress -->
            <div class="progress-container" id="progressContainer">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-text" id="progressText">Processando...</div>
            </div>
        </div>

        <!-- Blocks Preview (Audiobook only) -->
        <div class="card hidden" id="blocksCard">
            <div class="card-title">Blocos de Texto (<span id="blockCount">0</span> blocos)</div>
            <div class="blocks-preview" id="blocksPreview"></div>
        </div>

        <!-- Result -->
        <div class="result-container" id="resultContainer">
            <div class="result-card">
                <div class="result-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="20 6 9 17 4 12" />
                    </svg>
                </div>
                <div class="result-title">Áudio Pronto!</div>
                <div class="result-info" id="resultInfo">Duração: --:--</div>

                <audio id="audioPlayer" controls style="width: 100%; margin-bottom: 1rem;"></audio>

                <a class="btn-download" id="downloadBtn" href="#" download="magicvoice_audio.mp3">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                        <polyline points="7 10 12 15 17 10" />
                        <line x1="12" y1="15" x2="12" y2="3" />
                    </svg>
                    Baixar MP3
                </a>
                <button class="btn-new" onclick="resetApp()">
                    Novo Áudio
                </button>
            </div>
        </div>
    </main>

    <script src="/static/app.js"></script>
</body>

</html>
